# fly.toml app configuration file generated for enact on 2026-03-06T10:00:46-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'enact'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  CLOUD_BASE_URL = 'https://enact.fly.dev'
  ENACT_EMAIL_DRY_RUN = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
